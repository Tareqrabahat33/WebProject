<style>
        
    nav {
        background: linear-gradient(to right, #072c62,  #0b72cc);
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .nav-brand img {
        height: 48px;
        width: 48px;
    }
    .nav-links {
        display: flex;
        gap: 8px;
    }
    .nav-links a {
        color: #e3e3e3;
        padding: 14px 18px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 500;
        transition: background 0.2s, color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a:focus {
        background-color: #e3e3e3;
        color: #03204b;
        outline: none;
    }
    .nav-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
        gap: 4px;
    }
    .nav-toggle span {
        width: 25px;
        height: 3px;
        background: #e3e3e3;
        border-radius: 2px;
    }
    @media (max-width: 700px) {
        nav {
            flex-direction: column;
            align-items: stretch;
            padding: 0 10px;
        }
        .nav-links {
            flex-direction: column;
            width: 100%;
            display: none;
        }
        .nav-links.active {
            display: flex;
        }
        .nav-toggle {
            display: flex;
            margin-left: auto;
            margin-top: 8px;
        }
    }


    @keyframes move {
100% {
    transform: translate3d(0, 0, 1px) rotate(360deg);
}
